<!--
display behavior
----------------
block level elements
--------------------
block level elements are the elements which occupies total space and always start on a new line
heading,paragraph,list,table,form

inline elements
---------------
inline elements are the elements which occupies necessary space which doesnot starts on a new linw
span,anchor tag,img tag, input

dev and span
------------
division elements which is used to group the sections for applying styles

span
----
span tag is used to group the text for applying styles

semantics
---------
semantics are used to convey the meaning about the content to the brwoser and developer 
------------------------------------------------------------------------------------------

<header> - Represents introductory content, typically a group of introductory or navigational aids.
<footer> - Represents a footer for its nearest sectioning content or sectioning root element.
<article> - Represents a self-contained composition in a document, page, application, or site.
<section> - Represents a standalone section of functionality contained within an HTML document, typically with a heading.
<nav> - Represents a section of a page that links to other pages or to parts within the page: a section with navigation links.
<aside> - Represents a portion of a document whose content is only indirectly related to the document's main content.
<main> - Represents the dominant content of the <body> of a document.
<figure> - Represents self-contained content, frequently with a caption, and is typically referenced as a single unit.

forms
-----
forms are used to collect the data from the user and allowing users to submit data to the server
signup, login, registrations, and contact 

forms are defined with form tagform fields are defined with input tag
<form></form>


Attributes:
-----------
1.type: specifies the type of input field(text, password, email etc.)
2.placehloder: provides a hint or example of what the user should enter in the input field
3. for and id: the for attribute in the <lable> tag is used to associate the label with a specific input field
               the id attribute in the <input> tag is used to uniquely identify the input field. when 

-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <label for="username">Enter your name:</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="enter username"
        required
      />
      <br />
      <label for="">enter your email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="ente your mail"
        required
      />
      <br />
      <label for="phoneno">enter phone number:</label>
      <input
        type="tel"
        id="phoneno"
        name="phoneno"
        placeholder="enter your phone number"
        required
      />
      <br />
      <label for="slot">select a time slot:</label>
      <input type="datetime-local" id="slot" name="slot" />
      <br />
      <label for="files">upload files:</label>
      <input type="file" id="files" />
      <br />
      <input type="date" id="date" name="date" />
      <input type="month" id="month" name="month" />
      <input type="week" id="week" name="week" />
      <input type="range" id="range" name="range" min="0" max="100" />
      <br />
      <label for="search">Search:</label>
      <input type="search" id="search" name="search" placeholder="search..." />
      <button type="submit">submit</button>
      <button type="reset">Reset</button>
    </form>
    <form>
      <p>select your tech stack</p>
      <br />
      <input type="radio" name="Skillset" id="pfs" value="python" />
      <label for="pfs">Python Full Stack</label>
      <br />
      <input type="radio" name="Skillset" id="jfs" value="java" />
      <label for="jfs">Java Full Stack</label>
      <br />
      <input type="radio" name="Skillset" id="mern" value="MERN" />
      <label for="mern">MERN Stack</label>
      <br />
    </form>
    <form>
      <p>SElect your tech stack</p>
      <input type="checkbox" name="Skills" id="pfs" value="python" />
      <label for="pfs">Python Full Stack</label>
      <br />
      <input type="checkbox" name="Skills" id="jfs" value="java" />
      <label for="jfs">Java Full Stack</label>
      <br />
      <input type="checkbox" name="Skills" id="mern" value="MERN" />
      <label for="mern">MERN Stack</label>
      <br />
      <label for="Education">choose your education</label>
      <select name="education" id="education">
        <option value="btech">btech</option>
        <option value="degree">degree</option>
      </select>
      <br />
      <textarea name="Msg" id="Msg" cols="30" rows="10"> </textarea>
      <br />
      <input type="checkbox" required /><label for=""
        >i agree for terms and conditions</label
      >
      <br />
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
