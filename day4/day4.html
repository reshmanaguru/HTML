<!--
CSS - cascading styles sheets
cascading - flowing
Styles - properties
Sheets - doc

it is used to describe the presentation of a html document it deals with colors, texts, fonts, background, animations, layouts and media queries

how to insert css
-----------------
1) inline css
-------------
styles are added to the html element itself by using style attributes
<h1 styles='color:red;'>inline content<h1/>
2) internal css
---------------
styles are added to the html document using style tag in head section
<style></style>

selectors
---------
it is used to target the html elements for applying styles

syntax
------
selectors{
declaration
property:value;
}
h2{
color:green;
}

3) external css
----------------
in external css styles are defined in external file that has .css extension
and linked with link tag
syntax
------
<link rel="stylesheet" href=day4.css

high specificity - high precedence
inline having high specificity
based on how we define - predefined internal them external

types of selectors
------------------
1)simple selectors
------------------
a) element selector or tagname selector styles will be applied based on element
eg:
h1{
    color:red;
}
b) class selector
-----------------
it is denoted with .classname
styles will be applied to the elements according to their class
eg:
.title{
    color:red;
}
<h1 class="title">content<h1/>
c) id selector
--------------
it is denoted by #idname
eg:
#Rl1{
    color:red;
}
    <h1 class="title" id="Rl1">content</h1>
2)combinators
3)pseudo class
4)attributes

specificity in selectors
-------------------------
1) id having high specificity
2) class having medium specificity
3) tagname having low specificity

Box model:
----------
it decribes the rectangular boxes that are generated for element in the document tree and laid out according to the visual formatting model
1. content: the content of the box where the images appear

-->
